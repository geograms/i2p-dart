name: i2p
description: >-
  A pure-Dart I2P node: decentralized, NAT-traversing, content-addressed file
  sharing with no native binaries, no router install and no router config.
version: 0.1.0
repository: https://github.com/geograms/i2p-flutter

environment:
  sdk: ^3.10.0

dependencies:
  crypto: ^3.0.3            # SHA256 / digests
  pointycastle: ^3.9.1      # AES, ChaCha20 (low-level block ciphers)
  cryptography: ^2.7.0      # pure-Dart X25519 / Ed25519 / ChaCha20-Poly1305 / HKDF
  archive: ^3.6.1           # pure-Dart zip extraction for the reseed su3 bundle

dev_dependencies:
  lints: ^4.0.0
  test: ^1.25.0
